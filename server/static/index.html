<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight-Monitor 数据看板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛫</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
}

/* ========== 登录页 ========== */
.login-container {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
}
.login-card {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 12px; padding: 40px 32px;
  width: 100%; max-width: 380px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.login-card h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #f0f6fc; }
.login-card .subtitle { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 28px; }
.login-card label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.login-card input {
  width: 100%; padding: 10px 14px; background: #0d1117;
  border: 1px solid #30363d; border-radius: 8px;
  color: #f0f6fc; font-size: 15px; margin-bottom: 18px;
  outline: none; transition: border-color .2s;
}
.login-card input:focus { border-color: #58a6ff; }
.login-card .btn {
  width: 100%; padding: 11px; background: #238636; color: #fff;
  border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
  font-weight: 600; transition: background .2s;
}
.login-card .btn:hover { background: #2ea043; }
.login-card .error {
  color: #f85149; font-size: 13px; text-align: center;
  margin-bottom: 14px; min-height: 20px;
}

/* ========== 主面板 ========== */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 14px 20px; display: flex; justify-content: space-between;
  align-items: center; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 18px; color: #f0f6fc; white-space: nowrap; }
.header .user-info { display: flex; align-items: center; gap: 14px; }
.header .user-info span { color: #8b949e; font-size: 13px; }
.header .logout-btn {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.header .logout-btn:hover { background: #30363d; }

.main { flex: 1; padding: 16px; max-width: 1200px; margin: 0 auto; width: 100%; }

/* 筛选栏 */
.filters {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; min-width: 120px; flex: 1; }
.filter-group label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
.filter-group select, .filter-group input {
  background: #0d1117; border: 1px solid #30363d;
  border-radius: 6px; color: #f0f6fc; padding: 8px 10px;
  font-size: 14px; outline: none;
}
.filter-group select:focus { border-color: #58a6ff; }

/* 日期前后导航按钮 */
.date-nav-btn {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  border-radius: 6px; padding: 8px 10px; font-size: 13px; cursor: pointer;
  transition: background .15s; flex-shrink: 0;
}
.date-nav-btn:hover { background: #30363d; }
.date-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 图表区 */
.chart-section {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
}
.chart-section h2 { font-size: 15px; color: #f0f6fc; margin-bottom: 12px; }
#trend-chart { width: 100%; height: 440px; }

/* 表格区 */
.table-section {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
  overflow-x: auto;
}
.table-section h2 { font-size: 15px; color: #f0f6fc; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
th {
  text-align: left; padding: 10px 8px; color: #8b949e;
  border-bottom: 1px solid #21262d; font-weight: 500; font-size: 12px;
  white-space: nowrap;
}
td { padding: 10px 8px; border-bottom: 1px solid #21262d22; white-space: nowrap; }
tr:hover td { background: #1c2128; }
.price { font-weight: 600; color: #f0f6fc; }
.price-down { color: #3fb950; }
.price-up { color: #f85149; }
.price-flat { color: #8b949e; }
.tag-new { color: #58a6ff; font-size: 12px; }

/* 排序箭头 */
.sort-header {
  cursor: pointer; user-select: none; position: relative; padding-right: 38px !important;
}
.sort-header:hover { color: #f0f6fc; }
.sort-arrows {
  display: inline-flex; flex-direction: column; position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); gap: 0; line-height: 1;
}
.sort-arrow {
  font-size: 10px; color: #484f58; cursor: pointer; transition: color .15s;
  line-height: 1.1; padding: 0 2px;
}
.sort-arrow:hover { color: #8b949e; }
.sort-arrow.active { color: #58a6ff; }

/* 加载 & 空状态 */
.loading, .empty {
  text-align: center; color: #8b949e; padding: 40px; font-size: 14px;
}
.spinner {
  display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d;
  border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* checkbox 组 */
#dest-checkboxes label { user-select: none; }
#dest-checkboxes input[type=checkbox] { accent-color: #58a6ff; cursor: pointer; }

/* 图表 + 自定义图例布局（图例在上，图表在下） */
.chart-layout { display: flex; flex-direction: column; gap: 8px; }
#trend-chart { width: 100%; }
#custom-legend { padding: 4px 0; }
#custom-legend .legend-group {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 4px; flex-wrap: wrap;
}
#custom-legend .legend-group-title {
  font-size: 12px; font-weight: 600; color: #f0f6fc;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  flex-shrink: 0; min-width: 60px; line-height: 22px;
}
#custom-legend .legend-item {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; cursor: pointer;
  font-size: 12px; color: #c9d1d9; transition: background .15s;
  user-select: none; white-space: nowrap;
}
#custom-legend .legend-item:hover { background: #21262d; }
#custom-legend .legend-item.off { opacity: .4; text-decoration: line-through; }
#custom-legend .legend-color {
  width: 14px; height: 3px; border-radius: 2px; flex-shrink: 0;
}
#custom-legend .legend-item.off .legend-color { opacity: .3; }

/* 响应式 */
@media (max-width: 600px) {
  .header h1 { font-size: 15px; }
  .header .user-info span { display: none; }
  .filters { flex-direction: column; padding: 12px; }
  .filter-group { min-width: 100%; }
  #trend-chart { height: 300px; }
  .main { padding: 10px; }
  .chart-section, .table-section { padding: 12px; }
}

/* ========== AI 聊天 ========== */
.chat-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  width: 44px; height: 44px;
  background: transparent; color: #c9d1d9; border: none;
  font-size: 32px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, color .2s;
}
.chat-btn:hover { color: #58a6ff; transform: scale(1.15); }
.chat-modal-mask {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.55); justify-content: center; align-items: center;
}
.chat-modal-mask.show { display: flex; }
.chat-modal {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  width: 420px; max-width: 90vw; max-height: 560px;
  display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
.chat-modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid #21262d;
}
.chat-modal-header span { font-size: 15px; font-weight: 600; color: #f0f6fc; }
.chat-modal-header button {
  background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer;
}
.chat-modal-header button:hover { color: #f0f6fc; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 10px;
  max-height: 380px;
}
.chat-msg {
  max-width: 85%; padding: 10px 14px; border-radius: 10px;
  font-size: 13px; line-height: 1.55; word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end; background: #1f6feb; color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start; background: #21262d; color: #c9d1d9;
  border-bottom-left-radius: 4px;
}
.chat-msg.loading { background: transparent; color: #8b949e; font-style: italic; }
.chat-input-row {
  display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid #21262d;
}
.chat-input-row textarea {
  flex: 1; background: #0d1117; border: 1px solid #30363d;
  border-radius: 8px; color: #f0f6fc; font-size: 13px; padding: 8px 10px;
  resize: none; outline: none; font-family: inherit; rows: 1;
}
.chat-input-row textarea:focus { border-color: #58a6ff; }
.chat-input-row button {
  background: #238636; color: #fff; border: none; border-radius: 8px;
  padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
}
.chat-input-row button:hover { background: #2ea043; }
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

/* AI 引导标签 */
.chat-guide-tag {
  position: fixed; bottom: 36px; right: 82px; z-index: 1001;
  background: #1f6feb; color: #fff; border-radius: 6px;
  padding: 4px 8px; font-size: 12px; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.chat-guide-tag .guide-close {
  background: none; border: none; color: rgba(255,255,255,0.7);
  font-size: 14px; cursor: pointer; line-height: 1; padding: 0;
}
.chat-guide-tag .guide-close:hover { color: #fff; }

/* 底部 */
.footer {
  background: #161b22; border-top: 1px solid #30363d;
  padding: 16px 20px; text-align: center; font-size: 12px; color: #484f58;
  line-height: 1.8; margin-top: auto;
}
.footer a { color: #58a6ff; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer .sep { color: #21262d; margin: 0 8px; }
.footer .github-icon {
  display: inline-block; width: 14px; height: 14px; vertical-align: text-bottom;
  margin-right: 2px; fill: #484f58;
}
.footer a:hover .github-icon { fill: #58a6ff; }
</style>
</head>
<body>

<!-- ========== 登录页 ========== -->
<div id="login-page" class="login-container">
  <div class="login-card">
    <h1>🛫 Flight-Monitor</h1>
    <p class="subtitle">航班价格数据看板</p>
    <div class="error" id="login-error"></div>
    <label>用户名</label>
    <input type="text" id="login-user" placeholder="请输入用户名" autocomplete="username">
    <label>密码</label>
    <input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- ========== 主面板（默认隐藏） ========== -->
<div id="app-page" class="app" style="display:none">
  <div class="header">
    <h1>🛫 Flight-Monitor 数据看板</h1>
    <div class="user-info">
      <span id="username-display"></span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="main">
    <!-- 筛选栏 -->
    <div class="filters">
      <div class="filter-group">
        <label>出发城市</label>
        <select id="select-from" onchange="onFromChange()">
          <option value="">请选择出发城市</option>
        </select>
      </div>
      <div class="filter-group" style="flex:3;min-width:250px">
        <label>到达城市（可多选） <a href="#" onclick="toggleAllDests();return false" style="color:#58a6ff;font-size:12px;margin-left:6px">全选/取消</a></label>
        <div id="dest-checkboxes" style="display:flex;flex-wrap:wrap;gap:8px 16px;padding:4px 0">
          <span style="color:#8b949e;font-size:13px">请先选择出发城市</span>
        </div>
      </div>
      <div class="filter-group" style="flex:2;min-width:300px">
        <label>航班日期</label>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="date-nav-btn" onclick="goNextDay()" title="前一天">◀</button>
          <select id="select-date" onchange="onDateChange()" style="flex:1;min-width:150px">
            <option value="">请先选择航线和日期</option>
          </select>
          <button class="date-nav-btn" onclick="goPrevDay()" title="后一天">▶</button>
          <button class="date-nav-btn" onclick="goToday()" title="回到今天" style="font-size:12px">今天</button>
        </div>
      </div>
    </div>

    <!-- 趋势图 -->
    <div class="chart-section">
      <h2>📈 价格趋势</h2>
      <div class="chart-layout">
        <div id="custom-legend"></div>
        <div id="trend-chart">
          <div class="empty" id="chart-empty">请选择航线、日期和航班查看价格趋势</div>
        </div>
      </div>
    </div>

    <!-- 航班列表 -->
    <div class="table-section">
      <h2>✈️ 航班列表 <span id="flight-count" style="color:#8b949e;font-weight:400"></span></h2>
      <p id="table-tip" style="color:#8b949e;font-size:12px;margin-bottom:10px;display:none">💡 点击任意航班行即可在上方查看该航班的价格走势</p>
      <div id="flight-table-container">
        <div class="empty" id="table-empty">请选择航线和日期查看航班</div>
      </div>
    </div>
  </div>

  <!-- AI 聊天按钮和弹窗 -->
  <button class="chat-btn" onclick="toggleChat()" title="AI 助手">🤖</button>
  <span class="chat-guide-tag" id="chat-guide">
    AI 助手
    <button class="guide-close" onclick="dismissGuide()">&times;</button>
  </span>
  <div class="chat-modal-mask" id="chat-modal-mask" onclick="closeChat(event)">
    <div class="chat-modal" onclick="event.stopPropagation()">
      <div class="chat-modal-header">
        <span>🤖 AI 航班助手</span>
        <button onclick="toggleChat()">&times;</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <textarea id="chat-input" rows="1" placeholder="问点什么..."></textarea>
        <button id="chat-send-btn" onclick="sendChat()">发送</button>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <footer class="footer">
    © 2026 Flight-Monitor <span class="sep">|</span> Powered by FastAPI + ECharts <span class="sep">|</span> 数据仅供参考，实际价格以航司官网为准
    <span class="sep">|</span> <a href="https://github.com/JoeyWu004/Flight-Monitor" target="_blank">

      @JoeyWu004
    </a>
  </footer>
</div>

<script>
// ============================================================
//  全局状态
// ============================================================
let token = localStorage.getItem("fm_token") || "";
let username = localStorage.getItem("fm_username") || "";
let routes = [];
let currentFlights = [];
let currentTrends = {};
let chartInstance = null;
let hoveredSeries = null;
let hoverTimer = null;

// 排序状态（默认按价格升序）
let sortColumn = "price";
let sortDirection = "asc";  // "asc" | "desc"

// ============================================================
//  API 封装
// ============================================================
async function api(path, options = {}) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;

  const resp = await fetch(path, { headers, ...options });
  const data = await resp.json();

  if (resp.status === 401) {
    // token 过期，退回登录页
    doLogout();
    throw new Error(data.detail || "未登录");
  }
  if (!resp.ok) throw new Error(data.detail || "请求失败");
  return data;
}

// ============================================================
//  登录 / 退出
// ============================================================
async function doLogin() {
  const user = document.getElementById("login-user").value.trim();
  const pass = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");

  if (!user || !pass) { errEl.textContent = "请输入用户名和密码"; return; }

  try {
    const resp = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.detail || "登录失败"; return; }

    token = data.token;
    username = data.username;
    localStorage.setItem("fm_token", token);
    localStorage.setItem("fm_username", username);

    showApp();
  } catch (e) {
    errEl.textContent = "网络错误，请检查服务器连接";
  }
}

function doLogout() {
  token = "";
  username = "";
  localStorage.removeItem("fm_token");
  localStorage.removeItem("fm_username");
  document.getElementById("login-page").style.display = "flex";
  document.getElementById("app-page").style.display = "none";
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
}

// 回车登录
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && document.getElementById("login-page").style.display !== "none") {
    doLogin();
  }
});

// ============================================================
//  页面切换
// ============================================================
async function showApp() {
  document.getElementById("login-page").style.display = "none";
  document.getElementById("app-page").style.display = "flex";
  document.getElementById("username-display").textContent = `👤 ${username}`;
  showGuide(); // 如果之前关闭过则隐藏，否则显示

  // 加载航线列表
  try {
    const data = await api("/api/routes");
    routes = data.routes;
    buildFromSelect();
  } catch (e) {
    console.error("加载航线失败:", e);
  }
}

// ============================================================
//  筛选器逻辑
// ============================================================
function buildFromSelect() {
  const sel = document.getElementById("select-from");
  sel.innerHTML = '<option value="">请选择出发城市</option>';

  const fromSet = new Set();
  routes.forEach(r => {
    if (!fromSet.has(r.from)) {
      fromSet.add(r.from);
      const opt = document.createElement("option");
      opt.value = r.from;
      opt.textContent = r.from_name;
      sel.appendChild(opt);
    }
  });
}

function onFromChange() {
  const from = document.getElementById("select-from").value;
  const container = document.getElementById("dest-checkboxes");
  document.getElementById("select-date").innerHTML = '<option value="">请先选择航线和日期</option>';
  clearFlights();

  if (!from) {
    container.innerHTML = '<span style="color:#8b949e;font-size:13px">请先选择出发城市</span>';
    return;
  }

  // 构建复选框
  const dests = routes.filter(r => r.from === from);
  if (!dests.length) {
    container.innerHTML = '<span style="color:#8b949e;font-size:13px">无可用目的地</span>';
    return;
  }
  container.innerHTML = dests.map(r =>
    `<label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:#c9d1d9;font-size:13px;white-space:nowrap">
      <input type="checkbox" value="${r.to}" onchange="onDestChange()">${r.to_name}
    </label>`
  ).join('');
}

function getSelectedDests() {
  const boxes = document.querySelectorAll("#dest-checkboxes input[type=checkbox]:checked");
  return Array.from(boxes).map(cb => cb.value);
}

function toggleAllDests() {
  const boxes = document.querySelectorAll("#dest-checkboxes input[type=checkbox]");
  const allChecked = boxes.length && Array.from(boxes).every(cb => cb.checked);
  boxes.forEach(cb => { cb.checked = !allChecked; });
  onDestChange();
}

async function onDestChange() {
  const from = document.getElementById("select-from").value;
  const dests = getSelectedDests();
  const dateSel = document.getElementById("select-date");

  if (!from || !dests.length) {
    dateSel.innerHTML = '<option value="">请先选择航线和日期</option>';
    clearFlights();
    return;
  }

  // 记录当前已选日期
  const prevDate = dateSel.value;

  // 获取所有选中目的地的日期交集
  dateSel.innerHTML = '<option value="">加载中...</option>';
  try {
    const allDates = [];
    for (const d of dests) {
      const data = await api(`/api/dates?frm=${from}&to=${d}`);
      allDates.push(new Set(data.dates));
    }
    // 取交集
    const common = [...allDates[0]].filter(d => allDates.every(s => s.has(d)));
    dateSel.innerHTML = '<option value="">请选择日期</option>';
    const weekMap = ['日', '一', '二', '三', '四', '五', '六'];
    common.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      const dow = new Date(d + 'T00:00:00').getDay();
      opt.textContent = d + ' ' + weekMap[dow];
      dateSel.appendChild(opt);
    });

    // 日期默认逻辑：优先选今天 > 保留之前选的 > 手动选择
    const today = new Date().toISOString().slice(0, 10);
    if (prevDate && common.includes(prevDate)) {
      dateSel.value = prevDate;
      onDateChange();
    } else if (common.includes(today)) {
      dateSel.value = today;
      onDateChange();
    } else {
      clearFlights();
    }
  } catch (e) {
    dateSel.innerHTML = '<option value="">加载失败</option>';
  }
}

async function onDateChange() {
  const from = document.getElementById("select-from").value;
  const dests = getSelectedDests();
  const date = document.getElementById("select-date").value;

  if (!from || !dests.length || !date) {
    clearFlights();
    return;
  }

  const toParam = dests.join(",");
  await loadFlights(from, toParam, date);
}

function goPrevDay() {
  const sel = document.getElementById("select-date");
  const idx = sel.selectedIndex;
  if (idx > 1) {
    sel.selectedIndex = idx - 1;
    onDateChange();
  }
}

function goNextDay() {
  const sel = document.getElementById("select-date");
  const idx = sel.selectedIndex;
  if (idx < sel.options.length - 1) {
    sel.selectedIndex = idx + 1;
    onDateChange();
  }
}

function goToday() {
  const sel = document.getElementById("select-date");
  const today = new Date().toISOString().slice(0, 10);
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === today) {
      sel.selectedIndex = i;
      onDateChange();
      return;
    }
  }
}

//  数据加载
// ============================================================
async function loadFlights(from, toParam, date) {
  const tableContainer = document.getElementById("flight-table-container");
  tableContainer.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
  const emptyEl = document.getElementById("chart-empty");
  if (emptyEl) emptyEl.style.display = "none";

  try {
    const data = await api(`/api/multi-flights?frm=${from}&to=${toParam}&date=${date}`);
    currentFlights = data.flights;
    renderFlightTable();
    loadAllTrends(from, toParam, date);
  } catch (e) {
    tableContainer.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function clearFlights() {
  currentFlights = [];
  currentTrends = {};
  document.getElementById("flight-table-container").innerHTML =
    '<div class="empty" id="table-empty">请选择航线和日期查看航班</div>';
  document.getElementById("flight-count").textContent = "";
  document.getElementById("table-tip").style.display = "none";
  document.getElementById("custom-legend").innerHTML = "";
  hoveredSeries = null;
  clearTimeout(hoverTimer);
  hoverTimer = null;
  if (chartInstance) {
    chartInstance.dispose();
    chartInstance = null;
  }
  chartSeriesNames = [];
  const chartDom = document.getElementById("trend-chart");
  chartDom.innerHTML = '<div class="empty" id="chart-empty">请选择航线、日期和航班查看价格走势</div>';
}

// ============================================================
//  航班列表渲染
// ============================================================
function renderFlightTable() {
  const container = document.getElementById("flight-table-container");
  const countEl = document.getElementById("flight-count");

  if (!currentFlights.length) {
    container.innerHTML = '<div class="empty">暂无航班数据</div>';
    countEl.textContent = "";
    return;
  }

  countEl.textContent = `(${currentFlights.length}个航班)`;
  document.getElementById("table-tip").style.display = "block";

  // 时间解析：处理 +1 天（如 "23:50+1" → 第2天凌晨）
  function parseTimeToMinutes(t) {
    if (!t) return 0;
    let days = 0;
    // 匹配 +天数（+1, +2 等）
    const dayMatch = t.match(/\+(\d+)$/);
    if (dayMatch) {
      days = parseInt(dayMatch[1]);
      t = t.replace(/\+(\d+)$/, "").trim();
    }
    const parts = t.split(":");
    const h = parseInt(parts[0]) || 0;
    const m = parseInt(parts[1]) || 0;
    return h * 60 + m + days * 1440;
  }

  // 排序
  const sorted = [...currentFlights].sort((a, b) => {
    let va, vb;
    switch (sortColumn) {
      case "airline":
        va = (a.airline || "").toLowerCase();
        vb = (b.airline || "").toLowerCase();
        return sortDirection === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      case "departure_time":
        va = parseTimeToMinutes(a.departure_time);
        vb = parseTimeToMinutes(b.departure_time);
        return sortDirection === "asc" ? va - vb : vb - va;
      case "arrival_time":
        va = parseTimeToMinutes(a.arrival_time);
        vb = parseTimeToMinutes(b.arrival_time);
        return sortDirection === "asc" ? va - vb : vb - va;
      case "departure_airport":
        va = (a.departure_airport || "").toLowerCase();
        vb = (b.departure_airport || "").toLowerCase();
        return sortDirection === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      case "arrival_airport":
        va = (a.arrival_airport || "").toLowerCase();
        vb = (b.arrival_airport || "").toLowerCase();
        return sortDirection === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      case "price":
        va = a.price || 0;
        vb = b.price || 0;
        return sortDirection === "asc" ? va - vb : vb - va;
      case "change_amount":
        // null 视为 0，排在最后
        va = a.last_price === null ? (sortDirection === "asc" ? Infinity : -Infinity) : (a.change_amount || 0);
        vb = b.last_price === null ? (sortDirection === "asc" ? Infinity : -Infinity) : (b.change_amount || 0);
        return sortDirection === "asc" ? va - vb : vb - va;
      default:
        return 0;
    }
  });

  // 生成排序箭头 HTML
  function sortArrow(col) {
    const upActive = sortColumn === col && sortDirection === "asc" ? " active" : "";
    const downActive = sortColumn === col && sortDirection === "desc" ? " active" : "";
    return `<span class="sort-arrows">
      <span class="sort-arrow${upActive}" onclick="event.stopPropagation();setSort('${col}','asc')">▲</span>
      <span class="sort-arrow${downActive}" onclick="event.stopPropagation();setSort('${col}','desc')">▼</span>
    </span>`;
  }

  let html = `<table>
    <thead><tr>
      <th><input type="checkbox" id="chart-select-all" checked onchange="toggleAllChartSelect(this)" title="全选/取消"></th>
      <th>目的地</th>
      <th class="sort-header">航司${sortArrow("airline")}</th>
      <th>航班号</th>
      <th class="sort-header">出发${sortArrow("departure_time")}</th>
      <th class="sort-header">到达${sortArrow("arrival_time")}</th>
      <th class="sort-header">出发机场${sortArrow("departure_airport")}</th>
      <th class="sort-header">到达机场${sortArrow("arrival_airport")}</th>
      <th class="sort-header">价格${sortArrow("price")}</th>
      <th class="sort-header">变动${sortArrow("change_amount")}</th>
      <th>抓取时间</th>
    </tr></thead><tbody>`;

  sorted.forEach((f, i) => {
    let changeHtml = "";
    if (f.last_price === null) {
      changeHtml = '<span class="tag-new">🆕 新航班</span>';
    } else if (f.change_amount > 0) {
      changeHtml = `<span class="price-up">📈 +${f.change_amount}元 (+${f.change_percent}%)</span>`;
    } else if (f.change_amount < 0) {
      changeHtml = `<span class="price-down">📉 ${f.change_amount}元 (${f.change_percent}%)</span>`;
    } else {
      changeHtml = '<span class="price-flat">➖ 未变动</span>';
    }

    const destName = f.route_to_name || f.route_to || '';
    const destBadge = `<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;background:${getAirlineColor(f.airline)};color:#fff">${destName}</span>`;

    const trendKey = `${f.flight_no} (${f.route_to})`;
    // 找到排序后航班在原数组中的索引，用于 onFlightClick
    const origIdx = currentFlights.indexOf(f);
    const rowClick = `onclick="onFlightClick(${origIdx})"`
        + ` onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background=''"`;
    html += `<tr ${rowClick} style="cursor:pointer" data-idx="${origIdx}">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="chart-flight-cb" checked data-key="${trendKey}" onchange="onChartSelectChange()"></td>
      <td>${destBadge}</td>
      <td>${f.airline}</td>
      <td style="color:#58a6ff;font-weight:500">${f.flight_no}</td>
      <td>${f.departure_time}</td>
      <td>${f.arrival_time}</td>
      <td>${f.departure_airport}</td>
      <td>${f.arrival_airport || ''}</td>
      <td class="price">¥${f.price}</td>
      <td>${changeHtml}</td>
      <td style="font-size:12px;color:#8b949e">${(f.crawl_time||'').slice(0,16)}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  container.innerHTML = html;
}

function setSort(col, dir) {
  sortColumn = col;
  sortDirection = dir;
  renderFlightTable();
}

// ============================================================
//  ECharts 趋势图
// ============================================================
async function onFlightClick(index) {
  const f = currentFlights[index];
  if (!f) return;

  // 高亮选中行
  document.querySelectorAll("#flight-table-container tr").forEach(el => el.style.background = "");
  const row = document.querySelector(`tr[data-idx="${index}"]`);
  if (row) row.style.background = "#1a3a5c";

  // 在图里高亮对应航班
  if (chartInstance) {
    const seriesName = `${f.airline} ${f.flight_no}`;
    chartInstance.dispatchAction({ type: "highlight", seriesName });
    setTimeout(() => {
      try { chartInstance.dispatchAction({ type: "downplay", seriesName }); } catch(e) {}
    }, 3000);
  }

  // 滚动到图表
  document.getElementById("trend-chart").scrollIntoView({ behavior: "smooth" });
}

const AIRLINE_BRAND_COLORS = [
  // [匹配关键词, 颜色, 说明]
  ['南方航空',    '#003D7C', '南航深蓝'],
  ['厦门航空',    '#29B6F6', '厦航天蓝'],
  ['华夏航空',    '#1A6DC8', '华夏蓝'],
  ['昆明航空',    '#089B7E', '昆航孔雀青'],
  ['吉祥航空',    '#721021', '吉祥酒红'],
  ['深圳航空',    '#C62828', '深航红'],
  ['上海航空',    '#E96356', '上航绯红'],
  ['河北航空',    '#F5900A', '河北金橙'],
  ['西部航空',    '#541473', '西部紫'],
  ['中国联合航空','#9D27B0', 'CUA紫'],
];
// 后备颜色：品牌色用完才用这里
const FALLBACK_COLORS = ['#d29922','#ff9b53','#a5d6ff','#56d364','#bc8cff','#f778ba','#39d2c0'];
const airlineColorMap = {};
let fallbackIdx = 0;
function getAirlineColor(airline) {
  const key = airline.replace(/\s+/g, '');
  if (!airlineColorMap[key]) {
    const match = AIRLINE_BRAND_COLORS.find(([kw]) => key.includes(kw));
    if (match) {
      airlineColorMap[key] = match[1];
    } else {
      airlineColorMap[key] = FALLBACK_COLORS[fallbackIdx % FALLBACK_COLORS.length];
      fallbackIdx++;
    }
  }
  return airlineColorMap[key];
}

async function loadAllTrends(from, to, date) {
  const chartDom = document.getElementById("trend-chart");
  const emptyEl = document.getElementById("chart-empty");
  if (emptyEl) emptyEl.style.display = "none";

  // 显示加载状态
  if (!chartInstance) {
    chartInstance = echarts.init(chartDom);
  }
  chartInstance.showLoading({ text: "加载趋势数据...", color: "#58a6ff", textColor: "#8b949e", maskColor: "rgba(13,17,23,0.8)" });

  try {
    const data = await api(`/api/trends?frm=${from}&to=${to}&date=${date}`);
    currentTrends = data.trends;
    renderMultiChart(currentTrends);
  } catch (e) {
    chartInstance.hideLoading();
    if (emptyEl) emptyEl.style.display = "block";
    console.error("加载趋势失败:", e);
  }
}

function renderMultiChart(trends) {
  const chartDom = document.getElementById("trend-chart");
  if (!chartInstance) {
    chartInstance = echarts.init(chartDom);
  }
  chartInstance.hideLoading();

  const flightList = Object.values(trends);
  if (!flightList.length) {
    document.getElementById("custom-legend").innerHTML = "";
    const emptyEl = document.getElementById("chart-empty");
    if (emptyEl) emptyEl.style.display = "block";
    if (chartInstance) {
      chartInstance.setOption({ series: [] }, true);
    }
    return;
  }

  // ---------- 自定义图例：按目的地上到下分组 ----------
  const groups = {};
  flightList.forEach(f => {
    const dest = f.route_to_name || f.route_to || "未知";
    if (!groups[dest]) groups[dest] = [];
    groups[dest].push(f);
  });

  const destOrder = Object.keys(groups).sort();
  let legendHtml = "";
  let seriesIdx = 0;

  destOrder.forEach(dest => {
    legendHtml += `<div class="legend-group"><div class="legend-group-title">${dest}</div><div>`;
    groups[dest].forEach(f => {
      const color = getAirlineColor(f.airline);
      legendHtml += `<span class="legend-item" data-idx="${seriesIdx}" onclick="toggleLegendItem(this, ${seriesIdx})">
        <span class="legend-color" style="background:${color}"></span>${f.airline} ${f.flight_no}
      </span>`;
      seriesIdx++;
    });
    legendHtml += `</div></div>`;
  });
  document.getElementById("custom-legend").innerHTML = legendHtml;

  // ---------- 图表数据 ----------
  const allTimes = new Set();
  flightList.forEach(f => f.trend.forEach(p => allTimes.add(p.time.slice(0, 16))));
  const timeArray = [...allTimes].sort();

  // 全局存储序列数据，供 tooltip formatter 查询同时间点其他航班
  window.__chartSeriesMeta = [];

  const series = flightList.map((f) => {
    const priceMap = {};
    f.trend.forEach(p => { priceMap[p.time.slice(0, 16)] = p.price; });
    const data = timeArray.map(t => priceMap[t] ?? null);
    const color = getAirlineColor(f.airline);
    const name = `${f.airline} ${f.flight_no}`;

    window.__chartSeriesMeta.push({ name, data, color });
    return {
      name,
      type: "line",
      show: true,
      data: data,
      smooth: true,
      connectNulls: true,
      triggerLineEvent: true,
      symbol: "circle",
      symbolSize: 5,
      lineStyle: { color: color, width: 2 },
      itemStyle: { color: color },
      emphasis: { focus: "series" },
    };
  });

  const allPrices = flightList.flatMap(f => f.trend.map(p => p.price));
  const minP = allPrices.length ? Math.min(...allPrices) : 0;
  const maxP = allPrices.length ? Math.max(...allPrices) : 0;

  // 日期切换处插入分隔标记（必须在 option 对象外部计算）
  const dayBreaks = [];
  let prevDay = "";
  timeArray.forEach((t, i) => {
    const day = t.slice(0, 10);
    if (day !== prevDay) {
      // 第一个日期也标记（prevDay="" 时 day !== "" 成立），后续换日时标记
      dayBreaks.push({ xAxis: t, label: { formatter: day, position: "insideStartTop", rotate: 0, color: "#8b949e", fontSize: 10, distance: 12 } });
    }
    prevDay = day;
  });
  if (dayBreaks.length && series.length) {
    series[0].markLine = {
      silent: true, symbol: "none",
      lineStyle: { color: "#30363d", type: "dashed", width: 1 },
      data: dayBreaks,
    };
  }

  const option = {
    title: {
      text: `航班价格走势对比 (${flightList.length}个航班)`,
      textStyle: { color: "#f0f6fc", fontSize: 14 },
      left: 10,
      top: 5,
    },
    tooltip: {
      trigger: "axis",
      axisPointer: { type: "none" },
      backgroundColor: "#161b22",
      borderColor: "#30363d",
      textStyle: { color: "#c9d1d9", fontSize: 12 },
      formatter: function (params) {
        if (!params || !params.length) return "";
        const time = params[0].name;
        // 悬停在航班线上：只显示该航班；悬停在其他区域：显示全部
        if (hoveredSeries) {
          const p = params.find(x => x.seriesName === hoveredSeries);
          if (p) {
            const color = p.color || "#8b949e";
            // 数据点：显示时间+价格；线段上：只显示航司航班号
            if (p.value != null) {
              return '<div style="font-weight:bold;margin-bottom:4px;color:#e6edf3">' + time + "</div>" +
                '<div style="display:flex;align-items:center;gap:6px;margin:2px 0">' +
                '<span style="display:inline-block;width:10px;height:3px;border-radius:2px;background:' + color + '"></span>' +
                '<span>' + p.seriesName + "</span>" +
                '<span style="margin-left:auto">¥' + p.value + "</span>" +
                "</div>";
            } else {
              return '<div style="display:flex;align-items:center;gap:6px">' +
                '<span style="display:inline-block;width:10px;height:3px;border-radius:2px;background:' + color + '"></span>' +
                '<span>' + p.seriesName + "</span>" +
                "</div>";
            }
          }
        }
        const valid = params.filter(p => p.value != null);
        if (!valid.length) return "";
        valid.sort((a, b) => a.value - b.value);
        let html = '<div style="font-weight:bold;margin-bottom:4px;color:#e6edf3">' + time + "</div>";
        for (const p of valid) {
          const color = p.color || "#8b949e";
          html +=
            '<div style="display:flex;align-items:center;gap:6px;margin:2px 0">' +
            '<span style="display:inline-block;width:10px;height:3px;border-radius:2px;background:' + color + '"></span>' +
            '<span>' + p.seriesName + "</span>" +
            '<span style="margin-left:auto">¥' + p.value + "</span>" +
            "</div>";
        }
        return html;
      },
    },
    legend: {
      show: false,
      data: series.map(s => s.name),
      selected: Object.fromEntries(series.map(s => [s.name, true])),
    },
    grid: { left: 55, right: 20, top: 65, bottom: 55 },
    xAxis: {
      type: "category",
      data: timeArray,
      axisLabel: {
        color: "#8b949e", fontSize: 10, rotate: 30,
        formatter: function (v) { return v.slice(11, 16); },  // 仅显示 HH:MM
      },
      axisLine: { lineStyle: { color: "#30363d" } },
    },
    yAxis: {
      type: "value",
      name: "¥",
      nameTextStyle: { color: "#8b949e", fontSize: 12 },
      axisLabel: { color: "#8b949e" },
      splitLine: { lineStyle: { color: "#21262d" } },
      min: minP > 0 ? minP - 100 : 0,
      max: maxP + 100,
    },
    series: series,
  };

  chartSeriesNames = series.map(s => s.name);
  chartTotalFlights = flightList.length;
  chartInstance.setOption(option, true);
  hoveredSeries = null;
  chartInstance.off('mouseover').off('mouseout').off('globalout');
  chartInstance.on('mouseover', function (p) {
    if (p.seriesName) {
      clearTimeout(hoverTimer);
      hoveredSeries = p.seriesName;
    }
  });
  chartInstance.on('mouseout', function () {
    hoverTimer = setTimeout(function () {
      hoveredSeries = null;
      if (chartInstance) chartInstance.dispatchAction({ type: 'showTip' }); // 刷新弹窗
    }, 150);
  });
  chartInstance.on('globalout', function () {
    clearTimeout(hoverTimer);
    hoveredSeries = null;
  });
  window.addEventListener("resize", () => chartInstance?.resize());

}

// 自定义图例的点击切换 — 与表格复选框双向同步
let chartSeriesNames = [];
let chartTotalFlights = 0;  // 用于动态更新标题 (x个航班)
function toggleLegendItem(el, idx) {
  const name = chartSeriesNames[idx];
  if (!name) return;

  // 从系列名中提取航班号（格式: "航司 KN5967"）
  const flightNo = name.split(" ").pop();
  if (!flightNo) return;

  // 找到对应表格行复选框，切换其状态
  const boxes = document.querySelectorAll(".chart-flight-cb");
  for (const cb of boxes) {
    if (cb.dataset.key && cb.dataset.key.includes(flightNo)) {
      cb.checked = !cb.checked;
      break;
    }
  }

  // 通过复选框变更事件同步图表和图例
  onChartSelectChange();
}

// 图表航班选择过滤 — 通过 ECharts legend 控制显隐，不重建图表
function getSelectedTrendKeys() {
  const boxes = document.querySelectorAll(".chart-flight-cb:checked");
  return new Set(Array.from(boxes).map(cb => cb.dataset.key));
}

function onChartSelectChange() {
  if (!chartInstance || !chartSeriesNames.length) return;

  const selected = getSelectedTrendKeys();

  // 更新每条序列的 ECharts legend 显隐状态
  chartSeriesNames.forEach(name => {
    const flightNo = name.split(" ").pop();
    let checked = false;
    for (const key of selected) {
      if (key.includes(flightNo)) { checked = true; break; }
    }
    chartInstance.dispatchAction({
      type: checked ? "legendSelect" : "legendUnSelect",
      name: name,
    });
  });

  // 同步自定义图例项的灰显状态
  document.querySelectorAll("#custom-legend .legend-item").forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const sName = chartSeriesNames[idx];
    if (!sName) return;
    const fNo = sName.split(" ").pop();
    let checked = false;
    for (const key of selected) { if (key.includes(fNo)) { checked = true; break; } }
    el.classList.toggle("off", !checked);
  });

  // 根据可见序列动态调整 Y 轴范围
  const meta = window.__chartSeriesMeta || [];
  let yMin = Infinity, yMax = -Infinity;
  chartSeriesNames.forEach(name => {
    const flightNo = name.split(" ").pop();
    let checked = false;
    for (const key of selected) { if (key.includes(flightNo)) { checked = true; break; } }
    if (!checked) return;
    const m = meta.find(m => m.name === name);
    if (m && m.data) {
      const prices = m.data.filter(v => v != null);
      if (prices.length) {
        yMin = Math.min(yMin, ...prices);
        yMax = Math.max(yMax, ...prices);
      }
    }
  });
  if (yMin !== Infinity && yMax !== -Infinity) {
    chartInstance.setOption({
      yAxis: { min: yMin - 50, max: yMax + 50 }
    });
  }

  // 更新图表标题航班数量
  if (chartInstance) {
    chartInstance.setOption({
      title: { text: `航班价格走势对比 (${selected.size}个航班)` }
    });
  }

  // 更新表头全选复选框状态
  const allBox = document.getElementById("chart-select-all");
  const allCbs = document.querySelectorAll(".chart-flight-cb");
  if (allBox && allCbs.length) {
    allBox.checked = selected.size === allCbs.length;
    allBox.indeterminate = selected.size > 0 && selected.size < allCbs.length;
  }
}

function toggleAllChartSelect(el) {
  const boxes = document.querySelectorAll(".chart-flight-cb");
  boxes.forEach(cb => { cb.checked = el.checked; });
  onChartSelectChange();
}

if (token) {
  // 尝试使用已保存的 token
  api("/api/routes").then(data => {
    routes = data.routes;
    showApp();
  }).catch(() => {
    doLogout();

// ============================================================
//  AI 聊天
// ============================================================
let chatHistory = [];

function showGuide() {
  document.getElementById("chat-guide").style.display = "";
}
function dismissGuide() {
  document.getElementById("chat-guide").style.display = "none";
}
function toggleChat() {
  dismissGuide();
  const mask = document.getElementById("chat-modal-mask");
  mask.classList.toggle("show");
  if (mask.classList.contains("show")) {
    document.getElementById("chat-input").focus();
  }
}

function closeChat(e) {
  if (e && e.target !== document.getElementById("chat-modal-mask")) return;
  document.getElementById("chat-modal-mask").classList.remove("show");
}

function addChatMsg(role, text) {
  const container = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = "chat-msg " + role;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send-btn");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  input.style.height = "auto";
  btn.disabled = true;

  addChatMsg("user", text);
  chatHistory.push({ role: "user", content: text });

  // 构建页面上下文（含真实航班数据）
  const fromSel = document.getElementById("select-from");
  const fromName = fromSel.options[fromSel.selectedIndex]?.textContent || "";
  const destChecks = document.querySelectorAll("#dest-checkboxes input[type=checkbox]:checked");
  const destNames = Array.from(destChecks).map(cb => {
    const label = cb.parentElement;
    return label ? label.textContent.trim() : cb.value;
  });
  const dateSel = document.getElementById("select-date");
  const dateText = dateSel.options[dateSel.selectedIndex]?.textContent || "";
  const ctxParts = [];
  if (fromName) ctxParts.push("出发城市=" + fromName);
  if (destNames.length) ctxParts.push("到达城市=" + destNames.join("、"));
  if (dateText) ctxParts.push("航班日期=" + dateText);

  // 附上真实航班列表
  if (currentFlights.length) {
    const flightInfo = currentFlights.map(f =>
      `[${f.airline} ${f.flight_no}] ${f.departure_time}→${f.arrival_time} ${f.departure_airport} 目的地${f.route_to_name||f.route_to} ¥${f.price}`
    ).join("\n");
    ctxParts.push("当前航班列表（共" + currentFlights.length + "个）：\n" + flightInfo);
  }
  // 附上趋势数据摘要（每个航班最近几天的价格）
  if (Object.keys(currentTrends).length) {
    const trendLines = [];
    for (const [key, fl] of Object.entries(currentTrends)) {
      const prices = fl.trend.map(p => p.price);
      const recent = fl.trend.slice(-7).map(p => p.time.slice(0, 16) + " ¥" + p.price).join(", ");
      if (prices.length >= 2) {
        const min = Math.min(...prices), max = Math.max(...prices);
        const avg = Math.round(prices.reduce((a,b)=>a+b,0) / prices.length);
        const std = Math.round(Math.sqrt(prices.reduce((s,p)=>s+(p-avg)**2,0)/prices.length));
        trendLines.push(`${fl.airline} ${fl.flight_no}: 均价¥${avg} 最低¥${min} 最高¥${max} 标准差¥${std} | 最近: ${recent}`);
      }
    }
    if (trendLines.length) ctxParts.push("价格趋势摘要：\n" + trendLines.join("\n"));
  }
  const pageCtx = ctxParts.length ? "\n【当前页面真实数据，请据此回答不要编造】" + ctxParts.join("\n") : "";

  const loadingDiv = addChatMsg("ai", "思考中...");
  loadingDiv.classList.add("loading");

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token,
      },
      body: JSON.stringify({
        messages: [
          { role: "system", content: "你是航班价格监控助手。用户在看Flight-Monitor数据看板，可以回答航班价格、趋势分析、出行建议等问题。请简洁回答。" + pageCtx },
          ...chatHistory,
        ],
      }),
    });
    const data = await resp.json();
    loadingDiv.remove();

    const reply = data.reply || "抱歉，请求失败：" + (data.detail || JSON.stringify(data));
    addChatMsg("ai", reply);
    chatHistory.push({ role: "assistant", content: reply });

    // 限制历史长度
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch (e) {
    loadingDiv.remove();
    addChatMsg("ai", "网络错误: " + e.message);
  }
  btn.disabled = false;
  document.getElementById("chat-input").focus();
}

// 文本框自动撑高
function autoResizeChatInput() {
  const ta = document.getElementById("chat-input");
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}
document.getElementById("chat-input").addEventListener("input", autoResizeChatInput);

// 回车发送（发送后重置高度）
document.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey && document.getElementById("chat-modal-mask").classList.contains("show")) {
    e.preventDefault();
    sendChat();
    setTimeout(function () {
      const ta = document.getElementById("chat-input");
      ta.style.height = "auto";
    }, 50);
  }
});
</script>
